<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>URL Shortner</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    background:linear-gradient(135deg,#f7f7fb,#eef2ff);
    min-height:100vh;
    color:#111827;
    overflow-x:hidden;
}

/* NAVBAR */

.navbar{
    width:100%;
    height:70px;
    background:white;
    border-bottom:1px solid #ececec;
    display:flex;
    align-items:center;
    padding:0 36px;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-box{
    width:38px;
    height:38px;
    border-radius:11px;
    background:linear-gradient(135deg,#7c3aed,#4f46e5);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:18px;
    font-weight:bold;
}

.logo h2{
    font-size:22px;
    font-weight:700;
}

/* MAIN */

.wrapper{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 16px;
    gap:20px;
}

/* CARD */

.card{
    width:100%;
    max-width:620px;
    background:white;
    border-radius:24px;
    padding:30px;
    box-shadow:
    0 10px 30px rgba(0,0,0,0.04),
    0 2px 10px rgba(0,0,0,0.03);
}

/* TITLE */

.title{
    text-align:center;
    font-size:32px;
    margin-bottom:26px;
    color:#0f172a;
}

/* INPUT */

.input-box{
    width:100%;
    height:62px;
    border:2px solid #8b5cf6;
    border-radius:16px;
    display:flex;
    align-items:center;
    padding:0 18px;
    background:white;
}

.input-box span{
    font-size:18px;
    margin-right:10px;
}

.input-box input{
    width:100%;
    border:none;
    outline:none;
    font-size:15px;
    background:none;
    color:#111827;
}

/* BUTTONS */

.btn{
    width:100%;
    height:58px;
    margin-top:16px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#7c3aed,#4f46e5);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.dashboard-btn{
    width:100%;
    height:54px;
    margin-top:12px;
    border-radius:16px;
    background:white;
    border:2px solid #e5e7eb;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    color:#111827;
    font-weight:600;
    font-size:15px;
}

/* ERROR */

.error{
    margin-top:16px;
    background:#fee2e2;
    color:#dc2626;
    padding:14px;
    border-radius:14px;
    text-align:center;
    font-size:14px;
}

/* RESULT */

.result-card{
    text-align:center;
}

.check{
    width:62px;
    height:62px;
    border-radius:50%;
    background:#dcfce7;
    color:#16a34a;
    font-size:28px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    margin-bottom:18px;
}

.result-card h2{
    font-size:26px;
    margin-bottom:22px;
}

.result-box{
    background:#f8f7ff;
    border-radius:18px;
    padding:14px;
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
}

.short-url{
    flex:1;
    background:white;
    border-radius:12px;
    padding:14px 16px;
    text-align:left;
    word-break:break-all;
    font-size:14px;
}

.copy-btn{
    border:none;
    background:linear-gradient(135deg,#7c3aed,#4f46e5);
    color:white;
    padding:14px 18px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    font-size:14px;
}

@media(max-width:768px){

    .navbar{
        padding:0 18px;
    }

    .card{
        padding:24px;
    }

    .title{
        font-size:28px;
    }

}

</style>
</head>

<body>

<div class="navbar">

    <div class="logo">

        <div class="logo-box">
            S
        </div>

        <h2>Shortify</h2>

    </div>

</div>

<div class="wrapper">

    <div class="card">

        <h1 class="title">
            Shorten your URLs
        </h1>

        <form method="POST" action="/shorten">

            <div class="input-box">

                <span>🔗</span>

                <input
                type="text"
                name="url"
                placeholder="https://example.com"
                required
                >

            </div>

            <button class="btn" type="submit">
                Shorten Link →
            </button>

            <a href="/dashboard" class="dashboard-btn">
                View Dashboard
            </a>

        </form>

        {% if error %}
        <div class="error">
            {{ error }}
        </div>
        {% endif %}

    </div>

    {% if short_url %}

    <div class="card result-card">

        <div class="check">
            ✓
        </div>

        <h2>
            Your link is ready!
        </h2>

        <div class="result-box">

            <div class="short-url" id="shortLink">
                {{ short_url }}
            </div>

            <button
            class="copy-btn"
            onclick="copyLink()"
            >
                Copy Link
            </button>

        </div>

    </div>

    {% endif %}

</div>

<script>

function copyLink(){

    const text =
    document.getElementById("shortLink").innerText;

    navigator.clipboard.writeText(text);

}

</script>

</body>
</html>
