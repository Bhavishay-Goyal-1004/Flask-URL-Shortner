<!DOCTYPE html>
<html>
<head>
    <title>URL Shortener</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container{
            width: 500px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px lightgray;
        }

        h1{
            text-align: center;
            color: #333;
        }

        form{
            margin-top: 30px;
        }

        input{
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid gray;
            border-radius: 5px;
            font-size: 15px;
        }

        button{
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #0056b3;
        }

        .result{
            margin-top: 20px;
            padding: 15px;
            background-color: #e9f7ef;
            border: 1px solid #28a745;
            border-radius: 5px;
        }

        .error{
            margin-top: 20px;
            padding: 15px;
            background-color: #fdecea;
            border: 1px solid red;
            color: red;
            border-radius: 5px;
        }

        a{
            color: #007bff;
        }

        .dashboard{
            text-align: center;
            margin-top: 20px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>URL Shortener</h1>

        <form action="/shorten" method="POST">

            <input
                type="text"
                name="url"
                placeholder="Enter long URL"
            >

            <button type="submit">
                Shorten URL
            </button>

        </form>

        {% if short_url %}

        <div class="result">

            <strong>Short URL:</strong>

            <br><br>

            <a href="{{ short_url }}" target="_blank">
                {{ short_url }}
            </a>

        </div>

        {% endif %}

        {% if error %}

        <div class="error">

            {{ error }}

        </div>

        {% endif %}

        <div class="dashboard">

            <a href="/dashboard">
                View Dashboard
            </a>

        </div>

    </div>

</body>

</html>
