<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body{
            font-family: Arial;
            background-color: #f4f4f4;
            margin: 0;
            padding: 30px;
        }

        h1{
            text-align: center;
            color: #333;
        }

        table{
            width: 90%;
            margin: 30px auto;
            border-collapse: collapse;
            background-color: white;
        }

        th{
            background-color: #007bff;
            color: white;
            padding: 15px;
        }

        td{
            padding: 12px;
            border: 1px solid #ddd;
        }

        tr:nth-child(even){
            background-color: #f9f9f9;
        }

        a{
            color: #007bff;
            text-decoration: none;
        }

        .back{
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h1>Dashboard</h1>
    {% if links %}
    <table>
        <tr>
            <th>Short URL</th>
            <th>Original URL</th>
            <th>Clicks</th>
        </tr>

        {% for code, info in links.items() %}
        <tr>
            <td>
                <a href="/s/{{ code }}" target="_blank">
                    /s/{{ code }}
                </a>
            </td>
            <td>

                <a href="{{ info.url }}" target="_blank">
                    {{ info.url }}
                </a>

            </td>
            <td>
                {{ info.clicks }}
            </td>
        </tr>
        {% endfor %}

    </table>
    {% else %}

    <h3 style="text-align:center;">
        No URLs available
    </h3>

    {% endif %}

    <div class="back">

        <a href="/">
            Back to Home
        </a>
    </div>
</body>
</html>
