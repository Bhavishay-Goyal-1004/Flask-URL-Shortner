<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    background:#f5f7ff;
    color:#111827;
}

.navbar{
    width:100%;
    height:70px;
    background:white;
    border-bottom:1px solid #ececec;
    display:flex;
    align-items:center;
    padding:0 36px;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-box{
    width:38px;
    height:38px;
    border-radius:11px;
    background:linear-gradient(135deg,#7c3aed,#4f46e5);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:18px;
    font-weight:bold;
}

.logo h2{
    font-size:22px;
    font-weight:700;
}

.wrapper{
    max-width:1000px;
    margin:auto;
    padding:30px 16px;
}

.table-card{
    background:white;
    border-radius:24px;
    padding:24px;
    box-shadow:
    0 10px 30px rgba(0,0,0,0.04),
    0 2px 10px rgba(0,0,0,0.03);
}

.table-title{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:22px;
}

.table-title h2{
    font-size:24px;
}

.create-link-btn{
    padding:12px 16px;
    border-radius:12px;
    background:linear-gradient(135deg,#7c3aed,#4f46e5);
    color:white;
    text-decoration:none;
    font-weight:600;
    font-size:14px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    text-align:left;
    padding-bottom:14px;
    color:#6b7280;
    font-size:14px;
}

td{
    padding:16px 0;
    border-top:1px solid #f1f1f1;
    font-size:14px;
    word-break:break-word;
}

.code{
    color:#4f46e5;
    font-weight:700;
}

.clicks{
    font-weight:600;
}

@media(max-width:768px){

    .navbar{
        padding:0 18px;
    }

    .table-card{
        overflow-x:auto;
    }

}

</style>
</head>

<body>

<div class="navbar">

    <div class="logo">

        <div class="logo-box">
            S
        </div>

        <h2>Shortify</h2>

    </div>

</div>

<div class="wrapper">

    <div class="table-card">

        <div class="table-title">

            <h2>Your Links</h2>

            <a href="/" class="create-link-btn">
                + Create Link
            </a>

        </div>

        <table>

            <thead>

                <tr>
                    <th>Code</th>
                    <th>Original URL</th>
                    <th>Clicks</th>
                </tr>

            </thead>

            <tbody>

                {% for code, details in links.items() %}

                <tr>

                    <td class="code">
                        {{ code }}
                    </td>

                    <td>
                        {{ details.url }}
                    </td>

                    <td class="clicks">
                        {{ details.clicks }}
                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
