<!DOCTYPE html>
<html>
<head>
    <title>Error 404</title>
    <style>
        body{
            font-family: Arial;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box{
            background: white;
            padding: 40px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0px 0px 10px lightgray;
        }

        h1{
            font-size: 70px;
            color: red;
            margin: 0;
        }

        p{
            color: #555;
        }

        a{
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>Error 404</h1>

        <p>
            Short URL not found
        </p>

        <a href="/">
            Go Home
        </a>
    </div>
</body>
</html>
