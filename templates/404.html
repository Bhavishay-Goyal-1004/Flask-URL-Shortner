<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Page Not Found</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#f7f7fb,#eef2ff);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:650px;
    background:white;
    border-radius:32px;
    padding:60px 40px;
    text-align:center;
    box-shadow:
    0 10px 30px rgba(0,0,0,0.05),
    0 2px 10px rgba(0,0,0,0.03);
}

.logo{
    width:70px;
    height:70px;
    margin:auto;
    margin-bottom:30px;
    border-radius:20px;
    background:linear-gradient(135deg,#7c3aed,#4f46e5);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:32px;
    font-weight:bold;
}

.error-code{
    font-size:120px;
    font-weight:800;
    line-height:1;
    color:#111827;
}

h1{
    margin-top:20px;
    font-size:42px;
    color:#111827;
}

p{
    margin-top:18px;
    color:#6b7280;
    font-size:18px;
    line-height:1.6;
}

.btn{
    display:inline-block;
    margin-top:35px;
    padding:18px 28px;
    border-radius:18px;
    background:linear-gradient(135deg,#7c3aed,#4f46e5);
    color:white;
    text-decoration:none;
    font-weight:600;
}

@media(max-width:600px){

    .card{
        padding:40px 25px;
    }

    .error-code{
        font-size:90px;
    }

    h1{
        font-size:32px;
    }

}

</style>
</head>

<body>

<div class="card">

    <div class="logo">
        S
    </div>

    <div class="error-code">
        404
    </div>

    <h1>
        Link not found
    </h1>

    <p>
        The short URL you are trying to access does not exist or may have been removed.
    </p>

    <a href="/" class="btn">
        Back to Home
    </a>

</div>

</body>
</html>
